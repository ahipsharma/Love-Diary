<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>My Diary ❤️</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <audio id="bgMusic" src="audio/I'll be there for you.mp3" loop></audio>
    <button id="musicToggle" class="music-btn">🔊 I'll be there for you</button>
    <h1 class="title">My Episodes of love with Manvi, curated with love and passion 💌</h1>

    <!-- Diary List -->
    <div id="diaryList" class="diary-list"></div>

    </div>
    </div>
    <div id="diaryView" class="diary-view hidden">
        <button id="closeDiary" class="back-btn">← Back</button>

        <h2 id="diaryTitle"></h2>

        <div id="diaryContent" class="diary-content"></div>

        <textarea id="replyInput" placeholder="Write something for me... 💭"></textarea>
    </div>
    <div class="bg-animation">
        <img src="images/Ai Manvi.png" />
        <img src="images/Blue dress.png" />
        <img src="images/Cheeks kiss.png" />
        <img src="images/Holding her on her back.png" />
        <img src="images/manvi blushing.png" />
    </div>
    <!-- Email Button -->
    <button id="openEmail" class="email-btn">💌 Send me something</button>

    <!-- Email Modal -->
    <div id="emailModal" class="email-modal hidden">
        <div class="email-box">
            <span id="closeEmail" class="close">×</span>

            <h2>Write to me 💖</h2>

            <input id="userEmail" placeholder="Your email 💌" />

            <textarea id="userMessage" placeholder="Write your thoughts... 💭"></textarea>

            <button id="sendEmail">Send 💌</button>
        </div>
    </div>
    <div id="animationContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
