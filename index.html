<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>My Diary ❤️</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- ENTRY SCREEN -->
    <div id="entryScreen" class="entry-screen">
        <div class="door-container">

            <img src="images/Friends_Door.jpg" class="door-img" />

            <div class="password-box">
                <input type="password" id="passwordInput"
                    placeholder="Enter the Password. Hint: It's our special day!" />
                <button id="enterBtn">Unlock 🚪</button>
            </div>

        </div>
    </div>
    <div id="secondScreen">
        <img src="images/ForeheadTouch.png" class="secondPageImage" />
        <h1>Happy Birthday Manvi!!</h1>
        <h2>Wish you many many happy returns of the day!!</h2>
        <button id="exploreBtn">Click to explore more!!</button>
    </div>

    </div>
    <div id="mainContent">
        <audio id="bgMusic" src="audio/I'll be there for you.mp3" loop></audio>
        <button id="musicToggle" class="music-btn">🔊 I'll be there for you</button>
        <h1 class="title">My Episodes of love with Manvi, curated with love and passion 💌</h1>

        <!-- Diary List -->
        <div id="diaryList" class="diary-list"></div>


    <div id="diaryView" class="diary-view hidden">
        <button id="closeDiary" class="back-btn">← Back</button>

        <h2 id="diaryTitle"></h2>

        <div id="diaryContent" class="diary-content"></div>

        <textarea id="replyInput" placeholder="Write something for me... 💭"></textarea>
    </div>
    <div class="bg-animation">
        <img src="images/Ai Manvi.png" />
        <img src="images/Blue dress.png" />
        <img src="images/Cheeks kiss.png" />
        <img src="images/Holding her on her back.png" />
        <img src="images/manvi blushing.png" />
    </div>
    <!-- Email Button -->
    <button id="openEmail" class="email-btn">💌 Send me something</button>

    <!-- Email Modal -->
    <div id="emailModal" class="email-modal hidden">
        <div class="email-box">
            <span id="closeEmail" class="close">×</span>

            <h2>Write to me 💖</h2>

            <input id="userEmail" placeholder="Your Name!" />

            <textarea id="userMessage" placeholder="Write your thoughts... 💭"></textarea>

            <button id="sendEmail">Send 💌</button>
        </div>
    </div>
    <!-- BUTTON -->
<button id="notificationBtn" class="main-btn">Miss me? 💖</button>

<!-- MODAL -->
<div id="notificationModal" class="notification-modal hidden">
  <div class="notification-box">
    
    <span id="closeNotification" class="close">×</span>

    <h2>Missing me? 💖</h2>
    <input id="userName" placeholder="Your Name..." />
    
    <button id="sendNotification" class="send-btn">
      Send💌
    </button>

  </div>
</div>
    <div id="animationContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    </div>
    </div>
    <script src="script.js"></script>
    </div>
</body>

</html>
